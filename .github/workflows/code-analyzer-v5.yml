name: Run Code Analyzer 5 Workflow

on:
  pull_request:
    branches:
      - main
      - UAT
  workflow_dispatch:
    inputs:
      config_branch:
        description: "Config branch"
        required: false
        default: ""

jobs:
  salesforce-code-analyzer-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ">=20"

      - name: Check out files
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Setup Code Analyzer 5
        run: sf plugins install code-analyzer@latest

      - name: Check config file presence
        id: check-config-file
        run: |
          if [ -f .github/workflows/config/code-analyzer-config.yml ]; then
            echo "config_exists=true" >> $GITHUB_OUTPUT
          else
            echo "config_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout config file from target branch
        if: ${{ inputs.config_branch != '' && steps.check-config-file.outputs.config_exists == 'true' }}
        run: |
          git fetch
          git checkout origin/${{ inputs.config_branch }} .github/workflows/config/code-analyzer-config.yml

      - name: Set analyzer args
        run: |
          if [ "${{ steps.check-config-file.outputs.config_exists }}" == "true" ]; then
            echo "ARGS=--workspace . --config-file .github/workflows/config/code-analyzer-config.yml --output-file results.html" >> $GITHUB_ENV
          else
            echo "ARGS=--workspace . --output-file results.html" >> $GITHUB_ENV
          fi

      - name: Run Code analyzer
        uses: forcedotcom/run-code-analyzer@v2
        with:
          run-arguments: ${{ env.ARGS }}
          results-artifact-name: salesforce-code-analyzer-v5-results
